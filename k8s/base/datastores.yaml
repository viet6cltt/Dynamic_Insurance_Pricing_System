apiVersion: v1
kind: Service
metadata:
  name: mlflow-server
spec:
  type: NodePort
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30500
  selector:
    app.kubernetes.io/name: mlflow-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow-server
        app.kubernetes.io/part-of: dynamic-insurance
    spec:
      containers:
        - name: mlflow-server
          image: dynamic-insurance/mlflow-server:local
          imagePullPolicy: Never
          command: ["mlflow"]
          args:
            - server
            - --host
            - 0.0.0.0
            - --port
            - "5000"
            - --backend-store-uri
            - postgresql://mlflow:mlflow@mlflow-postgres:5432/mlflow
            - --artifacts-destination
            - s3://mlflow-artifacts
            - --serve-artifacts
          ports:
            - containerPort: 5000
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                configMapKeyRef:
                  name: dynamic-insurance-config
                  key: MLFLOW_S3_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: dynamic-insurance-secrets
                  key: MLFLOW_S3_SECRET_ACCESS_KEY
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://minio:9000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
---
