    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  selector:
    app.kubernetes.io/name: minio
---
apiVersion: v1
kind: Service
metadata:
  name: minio-console
spec:
  type: NodePort
  ports:
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30901
    - name: api
      port: 9000
      targetPort: 9000
      nodePort: 30902
  selector:
    app.kubernetes.io/name: minio
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/part-of: dynamic-insurance
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-06-06T09-36-42Z
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                configMapKeyRef:
                  name: dynamic-insurance-config
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dynamic-insurance-secrets
                  key: MINIO_ROOT_PASSWORD
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
spec:
  backoffLimit: 12
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-init
        app.kubernetes.io/part-of: dynamic-insurance
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          image: minio/mc:RELEASE.2025-01-17T23-25-50Z
          command: ["/bin/sh", "-c"]
          args:
            - |
              until mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "Waiting for MinIO..."
                sleep 5
              done
              mc mb --ignore-existing local/"$MLFLOW_S3_BUCKET"
              mc mb --ignore-existing local/"$MINIO_BUCKET_NAME"
              mc anonymous set none local/"$MLFLOW_S3_BUCKET"
              mc anonymous set none local/"$MINIO_BUCKET_NAME"
          envFrom:
            - configMapRef:
                name: dynamic-insurance-config
            - secretRef:
                name: dynamic-insurance-secrets
---
