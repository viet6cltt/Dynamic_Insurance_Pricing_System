apiVersion: v1
kind: Service
metadata:
  name: service-discovery
spec:
  type: NodePort
  ports:
    - name: http
      port: 8761
      targetPort: 8761
      nodePort: 30876
  selector:
    app.kubernetes.io/name: service-discovery
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-discovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: service-discovery
  template:
    metadata:
      labels:
        app.kubernetes.io/name: service-discovery
        app.kubernetes.io/part-of: dynamic-insurance
    spec:
      containers:
        - name: service-discovery
          image: dynamic-insurance/service-discovery:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8761
          envFrom:
            - configMapRef:
                name: dynamic-insurance-config
            - secretRef:
                name: dynamic-insurance-secrets
          env:
            - name: PORT
              value: "8761"
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: authorization-server
spec:
  type: NodePort
  ports:
    - name: http
      port: 9000
      targetPort: 9000
      nodePort: 30090
  selector:
    app.kubernetes.io/name: authorization-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authorization-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: authorization-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authorization-server
        app.kubernetes.io/part-of: dynamic-insurance
    spec:
      containers:
        - name: authorization-server
          image: dynamic-insurance/authorization-server:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 9000
          envFrom:
            - configMapRef:
                name: dynamic-insurance-config
            - secretRef:
                name: dynamic-insurance-secrets
          env:
            - name: PORT
              value: "9000"
            - name: DB_HOST
              value: auth-db
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: auth_db
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: dynamic-insurance-config
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dynamic-insurance-secrets
                  key: POSTGRES_PASSWORD
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 90
            periodSeconds: 20
---
