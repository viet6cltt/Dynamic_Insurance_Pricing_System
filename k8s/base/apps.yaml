apiVersion: v1
kind: Service
metadata:
  name: ai-model-service
spec:
  type: NodePort
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30085
  selector:
    app.kubernetes.io/name: ai-model-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-model-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-model-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-model-service
        app.kubernetes.io/part-of: dynamic-insurance
    spec:
      containers:
        - name: ai-model-service
          image: dynamic-insurance/ai-model-service:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: dynamic-insurance-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
