apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: service-discovery
    patch: &spring-startup |-
      - op: add
        path: /spec/progressDeadlineSeconds
        value: 1800
      - op: add
        path: /spec/strategy
        value:
          type: Recreate
      - op: add
        path: /spec/template/spec/containers/0/startupProbe
        value:
          tcpSocket:
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 120
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe
        value:
          tcpSocket:
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 18
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe
        value:
          tcpSocket:
            port: http
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 8
  - target:
      kind: Deployment
      name: authorization-server
    patch: *spring-startup
  - target:
      kind: Deployment
      name: user-service
    patch: *spring-startup
  - target:
      kind: Deployment
      name: product-service
    patch: *spring-startup
  - target:
      kind: Deployment
      name: pricing-service
    patch: *spring-startup
  - target:
      kind: Deployment
      name: application-policy-service
    patch: *spring-startup
  - target:
      kind: Deployment
      name: payment-service
    patch: *spring-startup
  - target:
      kind: Deployment
      name: notification-service
    patch: *spring-startup
  - target:
      kind: Deployment
      name: apigateway
    patch: *spring-startup
  - target:
      kind: Deployment
      name: ai-model-service
    patch: |-
      - op: add
        path: /spec/progressDeadlineSeconds
        value: 900
      - op: add
        path: /spec/strategy
        value:
          type: Recreate
      - op: add
        path: /spec/template/spec/containers/0/startupProbe
        value:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 60
