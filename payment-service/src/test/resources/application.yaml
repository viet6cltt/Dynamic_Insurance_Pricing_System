spring:
  application:
    name: payment-service-test
  datasource:
    url: jdbc:h2:mem:paymentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  kafka:
    bootstrap-servers: localhost:9092
  task:
    scheduling:
      enabled: false

eureka:
  client:
    enabled: false

app:
  kafka:
    topics:
      payment-events: payment.events
  payment:
    expiration-minutes: 15
  outbox:
    poll-delay-ms: 1000
    batch-size: 50
    max-retries: 5
