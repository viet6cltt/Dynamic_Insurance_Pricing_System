server:
  port: ${PORT:8085}

spring:
  application:
    name: payment-service
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:${POSTGRES_HOST:${HOST:localhost}}}:${DB_PORT:${POSTGRES_PORT:5437}}/${DB_NAME:${POSTGRES_DB:payment_db}}
    username: ${DB_USER:${POSTGRES_USER:postgres}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

app:
  kafka:
    topics:
      payment-events: ${PAYMENT_EVENTS_TOPIC:payment.events}
  payment:
    expiration-minutes: ${PAYMENT_EXPIRATION_MINUTES:15}
  outbox:
    poll-delay-ms: ${OUTBOX_POLL_DELAY_MS:1000}
    batch-size: ${OUTBOX_BATCH_SIZE:50}
    max-retries: ${OUTBOX_MAX_RETRIES:5}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
