name: dynamic-insurance-full

x-spring-app: &spring-app
  restart: unless-stopped
  networks:
    - dynamic-insurance
  environment:
    EUREKA_SERVER_URL: http://service-discovery:8761/eureka/

x-postgres-env: &postgres-env
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres

services:
  service-discovery:
    image: dynamic-insurance/service-discovery:${IMAGE_TAG:-local}
    build:
      context: ./service-discovery
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      PORT: 8761
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - dynamic-insurance

  redis:
    image: redis:alpine
    container_name: dynamic-insurance-full-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret_password}
    volumes:
      - redis_data:/data
    networks:
      - dynamic-insurance

  kafka:
    image: apache/kafka:3.7.1
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks:
      - dynamic-insurance

  kafka-init:
    image: apache/kafka:3.7.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic payment.events --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic policy.events --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic pricing.events --partitions 3 --replication-factor 1"
    networks:
      - dynamic-insurance

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "18080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - dynamic-insurance

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - dynamic-insurance

  minio:
    image: minio/minio:RELEASE.2024-06-06T09-36-42Z
    restart: unless-stopped
    ports:
      - "9002:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - dynamic-insurance

  user-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      <<: *postgres-env
      POSTGRES_DB: user_service_db
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_service_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  auth-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      <<: *postgres-env
      POSTGRES_DB: auth_db
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  product-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      <<: *postgres-env
      POSTGRES_DB: product_db
    volumes:
      - product_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  pricing-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      <<: *postgres-env
      POSTGRES_DB: pricing_db
    volumes:
      - pricing_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pricing_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  policy-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5436:5432"
    environment:
      <<: *postgres-env
      POSTGRES_DB: policy_db
    volumes:
      - policy_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d policy_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  payment-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5437:5432"
    environment:
      <<: *postgres-env
      POSTGRES_DB: payment_db
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  notification-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5438:5432"
    environment:
      <<: *postgres-env
      POSTGRES_DB: notification_db
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  authorization-server:
    <<: *spring-app
    image: dynamic-insurance/authorization-server:${IMAGE_TAG:-local}
    build:
      context: ./authorization-server
    env_file:
      - ./authorization-server/.env
    ports:
      - "9000:9000"
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      PORT: 9000
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      ISSUER_URI: ${ISSUER_URI:-http://localhost:9000}
      CLIENT_ID: ${CLIENT_ID:-insu-client}
      CLIENT_SECRET: ${CLIENT_SECRET:-insu-secret-key}
      REDIRECT_URI: ${REDIRECT_URI:-http://localhost:3000/login/oauth2/code/custom}
      CLIENT_APP_URI: ${CLIENT_APP_URI:-http://localhost:3000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      USER_SERVICE_URI: http://user-service:8081

  user-service:
    <<: *spring-app
    image: dynamic-insurance/user-service:${IMAGE_TAG:-local}
    build:
      context: ./user-service
    ports:
      - "8081:8081"
    depends_on:
      user-db:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      PORT: 8081
      EUREKA_SERVER_URL: http://service-discovery:8761/eureka/
      DB_HOST: user-db
      DB_PORT: 5432
      DB_NAME: user_service_db
      DB_USER: postgres
      DB_PASSWORD: postgres

  product-service:
    <<: *spring-app
    image: dynamic-insurance/product-service:${IMAGE_TAG:-local}
    build:
      context: ./product-service
    ports:
      - "8082:8082"
    depends_on:
      product-db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      PORT: 8082
      DB_HOST: product-db
      DB_PORT: 5432
      DB_NAME: product_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      MINIO_ENDPOINT: http://minio:9000
      MINIO_EXTERNAL_URL: http://localhost:9002

  ai-model-service:
    image: dynamic-insurance/ai-model-service:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: ai-model-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8005:8000"
    environment:
      MODEL_ARTIFACT_DIR: /app/ml/artifacts
      MODEL_SOURCE: ${MODEL_SOURCE:-auto}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-server:5000}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  pricing-service:
    <<: *spring-app
    image: dynamic-insurance/pricing-service:${IMAGE_TAG:-local}
    build:
      context: ./pricing-service
    ports:
      - "8083:8083"
    depends_on:
      pricing-db:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      ai-model-service:
        condition: service_healthy
    environment:
      PORT: 8083
      DB_HOST: pricing-db
      DB_PORT: 5432
      DB_NAME: pricing_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PRICING_EVENTS_TOPIC: pricing.events
      PRODUCT_SERVICE_URL: http://product-service:8082
      USER_SERVICE_URL: http://user-service:8081
      POLICY_SERVICE_URL: http://application-policy-service:8084
      AI_MODEL_SERVICE_URL: http://ai-model-service:8000

  application-policy-service:
    <<: *spring-app
    image: dynamic-insurance/application-policy-service:${IMAGE_TAG:-local}
    build:
      context: ./application-policy-service
    ports:
      - "8084:8084"
    depends_on:
      policy-db:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      PORT: 8084
      EUREKA_SERVER_URL: http://service-discovery:8761/eureka/
      DB_HOST: policy-db
      DB_PORT: 5432
      DB_NAME: policy_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYMENT_EVENTS_TOPIC: payment.events
      POLICY_EVENTS_TOPIC: policy.events
      PRICING_SERVICE_URL: http://pricing-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8085
      CONTRACT_EXPIRY_REMINDER_DAYS: ${CONTRACT_EXPIRY_REMINDER_DAYS:-7}

  payment-service:
    <<: *spring-app
    image: dynamic-insurance/payment-service:${IMAGE_TAG:-local}
    build:
      context: ./payment-service
    ports:
      - "8085:8085"
    depends_on:
      payment-db:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      PORT: 8085
      EUREKA_SERVER_URL: http://service-discovery:8761/eureka/
      DB_HOST: payment-db
      DB_PORT: 5432
      DB_NAME: payment_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYMENT_EVENTS_TOPIC: payment.events

  notification-service:
    <<: *spring-app
    image: dynamic-insurance/notification-service:${IMAGE_TAG:-local}
    build:
      context: ./notification-service
    ports:
      - "8086:8086"
    depends_on:
      notification-db:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
    environment:
      PORT: 8086
      EUREKA_SERVER_URL: http://service-discovery:8761/eureka/
      DB_HOST: notification-db
      DB_PORT: 5432
      DB_NAME: notification_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYMENT_EVENTS_TOPIC: payment.events
      POLICY_EVENTS_TOPIC: policy.events
      PRICING_EVENTS_TOPIC: pricing.events
      USER_SERVICE_URL: http://user-service:8081
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-false}
      MAIL_FROM: ${MAIL_FROM:-no-reply@insurance.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Dynamic Insurance}

  apigateway:
    <<: *spring-app
    image: dynamic-insurance/apigateway:${IMAGE_TAG:-local}
    build:
      context: ./apigateway
    ports:
      - "8080:8080"
    depends_on:
      service-discovery:
        condition: service_healthy
      redis:
        condition: service_started
      authorization-server:
        condition: service_started
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      pricing-service:
        condition: service_started
      application-policy-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
    environment:
      PORT: 8080
      EUREKA_SERVER_URL: http://service-discovery:8761/eureka/
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret_password}
      INSURANCE_AS_URI: ${ISSUER_URI:-http://localhost:9000}
      INSURANCE_AS_JWK_URI: http://authorization-server:9000/oauth2/jwks
      GOOGLE_AS_URI: ${GOOGLE_AS_URI:-https://accounts.google.com}
      GOOGLE_AS_JWK_URI: ${GOOGLE_AS_JWK_URI:-https://www.googleapis.com/oauth2/v3/certs}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-*}
      USER_SERVICE_URL: http://user-service:8081
      AUTH_SERVICE_URL: http://authorization-server:9000
      PRODUCT_SERVICE_URL: http://product-service:8082
      PRICING_SERVICE_URL: http://pricing-service:8083
      POLICY_SERVICE_URL: http://application-policy-service:8084
      PAYMENT_SERVICE_URL: http://payment-service:8085
      NOTIFICATION_SERVICE_URL: http://notification-service:8086

networks:
  dynamic-insurance:

volumes:
  redis_data:
  kafka_data:
  user_db_data:
  auth_db_data:
  product_db_data:
  pricing_db_data:
  policy_db_data:
  payment_db_data:
  notification_db_data:
  minio_data:
