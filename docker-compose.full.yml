name: dynamic-insurance-full

x-spring-app: &spring-app
  restart: unless-stopped
  networks:
    - dynamic-insurance
  environment:
    EUREKA_SERVER_URL: http://service-discovery:8761/eureka/

x-postgres-env: &postgres-env
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres

services:
  service-discovery:
    image: dynamic-insurance/service-discovery:${IMAGE_TAG:-local}
    build:
      context: ./service-discovery
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      PORT: 8761
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - dynamic-insurance

  redis:
    image: redis:alpine
    container_name: dynamic-insurance-full-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret_password}
    volumes:
      - redis_data:/data
    networks:
      - dynamic-insurance

  kafka:
    image: apache/kafka:3.7.1
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks:
      - dynamic-insurance

  kafka-init:
    image: apache/kafka:3.7.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic payment.events --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic policy.events --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic pricing.events --partitions 3 --replication-factor 1"
    networks:
      - dynamic-insurance

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "18080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - dynamic-insurance

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - dynamic-insurance

  minio:
    image: minio/minio:RELEASE.2024-06-06T09-36-42Z
    restart: unless-stopped
    ports:
      - "9002:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - dynamic-insurance

  mlflow-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${MLFLOW_POSTGRES_PORT:-5439}:5432"
    environment:
      POSTGRES_DB: ${MLFLOW_POSTGRES_DB:-mlflow}
      POSTGRES_USER: ${MLFLOW_POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${MLFLOW_POSTGRES_PASSWORD:-mlflow}
    volumes:
      - mlflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MLFLOW_POSTGRES_USER:-mlflow} -d ${MLFLOW_POSTGRES_DB:-mlflow}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  mlflow-minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    restart: "no"
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until mc alias set local http://minio:9000 ${MLFLOW_S3_ACCESS_KEY_ID:-minioadmin} ${MLFLOW_S3_SECRET_ACCESS_KEY:-minioadminpassword}; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/${MLFLOW_S3_BUCKET:-mlflow-artifacts};
      mc anonymous set none local/${MLFLOW_S3_BUCKET:-mlflow-artifacts};"
    networks:
      - dynamic-insurance

  mlflow-server:
    image: dynamic-insurance/mlflow-server:${IMAGE_TAG:-local}
    build:
      context: ./infra/docker/mlflow
    restart: unless-stopped
    ports:
      - "${MLFLOW_TRACKING_PORT:-15000}:5000"
    depends_on:
      mlflow-postgres:
        condition: service_healthy
      mlflow-minio-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: ${MLFLOW_S3_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MLFLOW_S3_SECRET_ACCESS_KEY:-minioadminpassword}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --allowed-hosts
      - localhost,localhost:15000,127.0.0.1,127.0.0.1:15000,mlflow-server,mlflow-server:5000
      - --backend-store-uri
      - postgresql://${MLFLOW_POSTGRES_USER:-mlflow}:${MLFLOW_POSTGRES_PASSWORD:-mlflow}@mlflow-postgres:5432/${MLFLOW_POSTGRES_DB:-mlflow}
      - --artifacts-destination
      - s3://${MLFLOW_S3_BUCKET:-mlflow-artifacts}
      - --serve-artifacts
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - dynamic-insurance

  ai-model-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${AI_MODEL_POSTGRES_PORT:-5440}:5432"
    environment:
      POSTGRES_DB: ${AI_MODEL_POSTGRES_DB:-ai_model_db}
      POSTGRES_USER: ${AI_MODEL_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${AI_MODEL_POSTGRES_PASSWORD:-postgres}
    volumes:
      - ai_model_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AI_MODEL_POSTGRES_USER:-postgres} -d ${AI_MODEL_POSTGRES_DB:-ai_model_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  user-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      <<: *postgres-env
      POSTGRES_DB: user_service_db
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_service_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  auth-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      <<: *postgres-env
      POSTGRES_DB: auth_db
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  product-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      <<: *postgres-env
      POSTGRES_DB: product_db
    volumes:
      - product_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  pricing-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      <<: *postgres-env
      POSTGRES_DB: pricing_db
    volumes:
      - pricing_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pricing_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  policy-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5436:5432"
    environment:
      <<: *postgres-env
      POSTGRES_DB: policy_db
    volumes:
      - policy_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d policy_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  payment-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5437:5432"
    environment:
      <<: *postgres-env
      POSTGRES_DB: payment_db
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  notification-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5438:5432"
    environment:
      <<: *postgres-env
      POSTGRES_DB: notification_db
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  authorization-server:
    <<: *spring-app
    image: dynamic-insurance/authorization-server:${IMAGE_TAG:-local}
    build:
      context: ./authorization-server
    env_file:
      - ./authorization-server/.env
    ports:
      - "9000:9000"
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      PORT: 9000
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      ISSUER_URI: ${ISSUER_URI:-http://localhost:9000}
      CLIENT_ID: ${CLIENT_ID:-insu-client}
      CLIENT_SECRET: ${CLIENT_SECRET:-insu-secret-key}
      REDIRECT_URI: ${REDIRECT_URI:-http://localhost:3000/login/oauth2/code/custom}
      CLIENT_APP_URI: ${CLIENT_APP_URI:-http://localhost:3000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      USER_SERVICE_URI: http://user-service:8081

  user-service:
    <<: *spring-app
    image: dynamic-insurance/user-service:${IMAGE_TAG:-local}
    build:
      context: ./user-service
    ports:
      - "8081:8081"
    depends_on:
      user-db:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      PORT: 8081
      EUREKA_SERVER_URL: http://service-discovery:8761/eureka/
      DB_HOST: user-db
      DB_PORT: 5432
      DB_NAME: user_service_db
      DB_USER: postgres
      DB_PASSWORD: postgres

  product-service:
    <<: *spring-app
    image: dynamic-insurance/product-service:${IMAGE_TAG:-local}
    build:
      context: ./product-service
    ports:
      - "8082:8082"
    depends_on:
      product-db:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
    environment:
      PORT: 8082
      DB_HOST: product-db
      DB_PORT: 5432
      DB_NAME: product_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      MINIO_ENDPOINT: http://minio:9000
      MINIO_EXTERNAL_URL: http://localhost:9002
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret_password}

  ai-model-service:
    image: dynamic-insurance/ai-model-service:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: ai-model-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8005:8000"
    environment:
      MODEL_ARTIFACT_DIR: /app/ml/artifacts
      MODEL_SOURCE: ${MODEL_SOURCE:-auto}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-server:5000}
      AI_MODEL_DATABASE_URL: postgresql+psycopg://${AI_MODEL_POSTGRES_USER:-postgres}:${AI_MODEL_POSTGRES_PASSWORD:-postgres}@ai-model-db:5432/${AI_MODEL_POSTGRES_DB:-ai_model_db}
      REFERENCE_DATASET_PATH: /app/data/generated/synthetic_insurance_claims.csv
      DATASET_VERSION: ${DATASET_VERSION:-generated-current}
    depends_on:
      mlflow-server:
        condition: service_healthy
      ai-model-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dynamic-insurance

  model-trainer-worker:
    image: dynamic-insurance/insurance-model-trainer:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: ai-model-service/trainer.Dockerfile
    restart: unless-stopped
    environment:
      MODEL_ARTIFACT_DIR: /app/ml/artifacts
      MODEL_SOURCE: mlflow
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-server:5000}
      AI_MODEL_DATABASE_URL: postgresql+psycopg://${AI_MODEL_POSTGRES_USER:-postgres}:${AI_MODEL_POSTGRES_PASSWORD:-postgres}@ai-model-db:5432/${AI_MODEL_POSTGRES_DB:-ai_model_db}
      DATASET_VERSION: ${DATASET_VERSION:-generated-current}
      TRAINER_POLL_SECONDS: ${TRAINER_POLL_SECONDS:-5}
    depends_on:
      ai-model-db:
        condition: service_healthy
      mlflow-server:
        condition: service_healthy
    networks:
      - dynamic-insurance

  pricing-service:
    <<: *spring-app
    image: dynamic-insurance/pricing-service:${IMAGE_TAG:-local}
    build:
      context: ./pricing-service
    ports:
      - "8083:8083"
    depends_on:
      pricing-db:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      ai-model-service:
        condition: service_healthy
    environment:
      PORT: 8083
      DB_HOST: pricing-db
      DB_PORT: 5432
      DB_NAME: pricing_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PRICING_EVENTS_TOPIC: pricing.events
      PRODUCT_SERVICE_URL: http://product-service:8082
      USER_SERVICE_URL: http://user-service:8081
      POLICY_SERVICE_URL: http://application-policy-service:8084
      AI_MODEL_SERVICE_URL: http://ai-model-service:8000
      VND_PER_EUR: ${VND_PER_EUR:-27000}
      HEALTH_RISK_LOG_ALPHA: ${HEALTH_RISK_LOG_ALPHA:-0.18}
      HEALTH_FACTOR_MIN: ${HEALTH_FACTOR_MIN:-0.85}
      HEALTH_FACTOR_MAX: ${HEALTH_FACTOR_MAX:-1.40}
      PORTFOLIO_FACTOR_MIN: ${PORTFOLIO_FACTOR_MIN:-0.85}
      PORTFOLIO_FACTOR_MAX: ${PORTFOLIO_FACTOR_MAX:-1.30}
      PORTFOLIO_CREDIBILITY_K: ${PORTFOLIO_CREDIBILITY_K:-3.0}
      PORTFOLIO_NEUTRAL_PREV_COST_CLAIMS_YEAR_EUR: ${PORTFOLIO_NEUTRAL_PREV_COST_CLAIMS_YEAR_EUR:-222.2}
      PORTFOLIO_NEUTRAL_PREV_N_MEDICAL_SERVICES: ${PORTFOLIO_NEUTRAL_PREV_N_MEDICAL_SERVICES:-7.0}
      PORTFOLIO_NEUTRAL_PREV_HAD_CLAIM_OR_SERVICE: ${PORTFOLIO_NEUTRAL_PREV_HAD_CLAIM_OR_SERVICE:-false}
      PORTFOLIO_NEUTRAL_CLAIM_FREE_PREVIOUS_YEAR: ${PORTFOLIO_NEUTRAL_CLAIM_FREE_PREVIOUS_YEAR:-false}

  application-policy-service:
    <<: *spring-app
    image: dynamic-insurance/application-policy-service:${IMAGE_TAG:-local}
    build:
      context: ./application-policy-service
    ports:
      - "8084:8084"
    depends_on:
      policy-db:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      PORT: 8084
      EUREKA_SERVER_URL: http://service-discovery:8761/eureka/
      DB_HOST: policy-db
      DB_PORT: 5432
      DB_NAME: policy_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYMENT_EVENTS_TOPIC: payment.events
      POLICY_EVENTS_TOPIC: policy.events
      PRICING_SERVICE_URL: http://pricing-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8085
      CONTRACT_EXPIRY_REMINDER_DAYS: ${CONTRACT_EXPIRY_REMINDER_DAYS:-7}

  payment-service:
    <<: *spring-app
    image: dynamic-insurance/payment-service:${IMAGE_TAG:-local}
    build:
      context: ./payment-service
    ports:
      - "8085:8085"
    depends_on:
      payment-db:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      PORT: 8085
      EUREKA_SERVER_URL: http://service-discovery:8761/eureka/
      DB_HOST: payment-db
      DB_PORT: 5432
      DB_NAME: payment_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYMENT_EVENTS_TOPIC: payment.events

  notification-service:
    <<: *spring-app
    image: dynamic-insurance/notification-service:${IMAGE_TAG:-local}
    build:
      context: ./notification-service
    ports:
      - "8086:8086"
    depends_on:
      notification-db:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
    environment:
      PORT: 8086
      EUREKA_SERVER_URL: http://service-discovery:8761/eureka/
      DB_HOST: notification-db
      DB_PORT: 5432
      DB_NAME: notification_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYMENT_EVENTS_TOPIC: payment.events
      POLICY_EVENTS_TOPIC: policy.events
      PRICING_EVENTS_TOPIC: pricing.events
      USER_SERVICE_URL: http://user-service:8081
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-false}
      MAIL_FROM: ${MAIL_FROM:-no-reply@insurance.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Dynamic Insurance}

  apigateway:
    <<: *spring-app
    image: dynamic-insurance/apigateway:${IMAGE_TAG:-local}
    build:
      context: ./apigateway
    ports:
      - "8080:8080"
    depends_on:
      service-discovery:
        condition: service_healthy
      redis:
        condition: service_started
      authorization-server:
        condition: service_started
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      pricing-service:
        condition: service_started
      application-policy-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
    environment:
      PORT: 8080
      EUREKA_SERVER_URL: http://service-discovery:8761/eureka/
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret_password}
      INSURANCE_AS_URI: ${ISSUER_URI:-http://localhost:9000}
      INSURANCE_AS_JWK_URI: http://authorization-server:9000/oauth2/jwks
      GOOGLE_AS_URI: ${GOOGLE_AS_URI:-https://accounts.google.com}
      GOOGLE_AS_JWK_URI: ${GOOGLE_AS_JWK_URI:-https://www.googleapis.com/oauth2/v3/certs}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-*}
      USER_SERVICE_URL: http://user-service:8081
      AUTH_SERVICE_URL: http://authorization-server:9000
      PRODUCT_SERVICE_URL: http://product-service:8082
      PRICING_SERVICE_URL: http://pricing-service:8083
      POLICY_SERVICE_URL: http://application-policy-service:8084
      PAYMENT_SERVICE_URL: http://payment-service:8085
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      AI_MODEL_SERVICE_URL: http://ai-model-service:8000

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      service-discovery:
        condition: service_started
      authorization-server:
        condition: service_started
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      ai-model-service:
        condition: service_started
      pricing-service:
        condition: service_started
      application-policy-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
      apigateway:
        condition: service_started
    networks:
      - dynamic-insurance

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: light
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/dynamic-insurance-http.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - dynamic-insurance

