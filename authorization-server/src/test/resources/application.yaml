spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  security:
    oauth2:
      authorizationserver:
        issuer-uri: http://localhost:9000
      client:
        client-id: insu-client
        client-secret: insu-secret-key
        redirect-uri: http://localhost:3000/login/oauth2/code/custom

app:
  client-uri: http://localhost:3000
  google:
    client-id: dummy-google-id
    client-secret: dummy-google-secret
    redirect-path: /login/oauth2/code/google
  cors:
    allowed-origins: http://localhost:3000
  user-service-uri: http://localhost:8081
