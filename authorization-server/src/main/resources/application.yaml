spring:
  application:
    name: AuthorizationServer
  config:
    import: optional:file:.env[.properties]
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  security:
    oauth2:
      authorizationserver:
        issuer-uri: ${ISSUER_URI:http://${HOST:localhost}:${PORT:9000}}
      client:
        client-id: ${CLIENT_ID:insu-client}
        client-secret: ${CLIENT_SECRET:insu-secret-key}
        redirect-uri: ${REDIRECT_URI:http://localhost:3000/login/oauth2/code/custom}
      key:
        public-key: classpath:public.pem
        private-key: classpath:private.pem

  datasource:
    url: jdbc:postgresql://${DB_HOST:${POSTGRES_HOST:${HOST:localhost}}}:${DB_PORT:${POSTGRES_PORT:5433}}/${DB_NAME:${POSTGRES_DB:auth_db}}
    username: ${DB_USER:${POSTGRES_USER:postgres}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver

app:
  client-uri: ${CLIENT_APP_URI:http://localhost:3000}
  google:
    client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
    client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
    redirect-path: ${GOOGLE_REDIRECT_PATH:/login/oauth2/code/google}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  user-service-uri: ${USER_SERVICE_URI:http://localhost:8081}

server:
  port: ${PORT:9000}
  address: 0.0.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
