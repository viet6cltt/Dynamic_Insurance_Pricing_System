spring:
  datasource:
    url: jdbc:h2:mem:notification_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
  mail:
    host: localhost
    port: 1025
  cloud:
    discovery:
      enabled: false

app:
  services:
    user-service-url: http://localhost:8081
  mail:
    from: no-reply@test.local
    from-name: Dynamic Insurance Test
  kafka:
    topics:
      payment-events: payment.events
      policy-events: policy.events
      pricing-events: pricing.events
    consumer-groups:
      notifications: notification-service-test-group
  email:
    outbox:
      poll-delay-ms: 1000
      batch-size: 25
      max-retries: 3

eureka:
  client:
    enabled: false
