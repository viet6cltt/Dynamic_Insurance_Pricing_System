services:
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret_password}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-secret_password}
    volumes:
      - redis_data:/data

volumes:
  redis_data:
