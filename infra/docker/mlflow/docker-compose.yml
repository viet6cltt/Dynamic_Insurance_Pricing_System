services:
  mlflow-postgres:
    image: postgres:16-alpine
    container_name: dynamic-insurance-mlflow-postgres
    environment:
      POSTGRES_DB: ${MLFLOW_POSTGRES_DB:-mlflow}
      POSTGRES_USER: ${MLFLOW_POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${MLFLOW_POSTGRES_PASSWORD:-mlflow}
    ports:
      - "${MLFLOW_POSTGRES_PORT:-5439}:5432"
    volumes:
      - mlflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${MLFLOW_POSTGRES_USER:-mlflow} -d ${MLFLOW_POSTGRES_DB:-mlflow}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mlflow-minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: dynamic-insurance-mlflow-minio-init
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MLFLOW_S3_ACCESS_KEY_ID:-minioadmin} ${MLFLOW_S3_SECRET_ACCESS_KEY:-minioadminpassword}; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/${MLFLOW_S3_BUCKET:-mlflow-artifacts};
      mc anonymous set none local/${MLFLOW_S3_BUCKET:-mlflow-artifacts};
      "
    restart: "no"

  mlflow-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dynamic-insurance-mlflow-server
    depends_on:
      mlflow-postgres:
        condition: service_healthy
      mlflow-minio-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: ${MLFLOW_S3_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MLFLOW_S3_SECRET_ACCESS_KEY:-minioadminpassword}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "${MLFLOW_TRACKING_PORT:-15000}:5000"
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - postgresql://${MLFLOW_POSTGRES_USER:-mlflow}:${MLFLOW_POSTGRES_PASSWORD:-mlflow}@mlflow-postgres:5432/${MLFLOW_POSTGRES_DB:-mlflow}
      - --artifacts-destination
      - s3://${MLFLOW_S3_BUCKET:-mlflow-artifacts}
      - --serve-artifacts
    restart: unless-stopped

volumes:
  mlflow_postgres_data:

networks:
  default:
    name: dynamic-insurance-full_dynamic-insurance
    external: true
