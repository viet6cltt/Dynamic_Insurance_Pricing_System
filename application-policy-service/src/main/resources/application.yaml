server:
  port: ${PORT:8084}

spring:
  application:
    name: application-policy-service
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:${POSTGRES_HOST:${HOST:localhost}}}:${DB_PORT:${POSTGRES_PORT:5436}}/${DB_NAME:${POSTGRES_DB:policy_db}}
    username: ${DB_USER:${POSTGRES_USER:postgres}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${PAYMENT_EVENTS_CONSUMER_GROUP:policy-service-payment-group}
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: record
    producer:
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

app:
  services:
    pricing-service-url: ${PRICING_SERVICE_URL:http://localhost:8083}
    payment-service-url: ${PAYMENT_SERVICE_URL:http://localhost:8085}
  kafka:
    topics:
      payment-events: ${PAYMENT_EVENTS_TOPIC:payment.events}
      policy-events: ${POLICY_EVENTS_TOPIC:policy.events}
    consumer-groups:
      payment-events: ${PAYMENT_EVENTS_CONSUMER_GROUP:policy-service-payment-group}
  outbox:
    poll-delay-ms: ${OUTBOX_POLL_DELAY_MS:1000}
    batch-size: ${OUTBOX_BATCH_SIZE:50}
    max-retries: ${OUTBOX_MAX_RETRIES:5}
  policy:
    expiration-cron: ${POLICY_EXPIRATION_CRON:0 5 0 * * *}
    expiry-reminder-days: ${CONTRACT_EXPIRY_REMINDER_DAYS:7}

# Actuator Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
