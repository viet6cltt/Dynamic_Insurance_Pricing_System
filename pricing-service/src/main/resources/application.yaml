server:
  port: 8083

spring:
  application:
    name: pricing-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pricing_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  services:
    product-service-url: ${PRODUCT_SERVICE_URL:http://localhost:8082}
    user-service-url: ${USER_SERVICE_URL:http://localhost:8081}
    application-policy-service-url: ${POLICY_SERVICE_URL:http://localhost:8084}
    ai-model-service-url: ${AI_MODEL_SERVICE_URL:http://localhost:8000}

# Actuator Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
