server:
  port: ${PORT:8083}

spring:
  application:
    name: pricing-service
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:${POSTGRES_HOST:${HOST:localhost}}}:${DB_PORT:${POSTGRES_PORT:5435}}/${DB_NAME:${POSTGRES_DB:pricing_db}}
    username: ${DB_USER:${POSTGRES_USER:postgres}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

app:
  services:
    product-service-url: ${PRODUCT_SERVICE_URL:http://localhost:8082}
    user-service-url: ${USER_SERVICE_URL:http://localhost:8081}
    application-policy-service-url: ${POLICY_SERVICE_URL:http://localhost:8084}
    ai-model-service-url: ${AI_MODEL_SERVICE_URL:http://localhost:8000}
  kafka:
    topics:
      pricing-events: ${PRICING_EVENTS_TOPIC:pricing.events}
  outbox:
    publisher-enabled: ${OUTBOX_PUBLISHER_ENABLED:true}
    poll-delay-ms: ${OUTBOX_POLL_DELAY_MS:1000}
    batch-size: ${OUTBOX_BATCH_SIZE:50}
    max-retries: ${OUTBOX_MAX_RETRIES:5}
  quote:
    expiration-cron: ${QUOTE_EXPIRATION_CRON:0 10 0 * * *}
  currency:
    vnd-per-eur: ${VND_PER_EUR:27000}
  rating:
    health-risk-log-alpha: ${HEALTH_RISK_LOG_ALPHA:0.18}
    health-factor-min: ${HEALTH_FACTOR_MIN:0.85}
    health-factor-max: ${HEALTH_FACTOR_MAX:1.40}
    portfolio-factor-min: ${PORTFOLIO_FACTOR_MIN:0.85}
    portfolio-factor-max: ${PORTFOLIO_FACTOR_MAX:1.30}
    portfolio-credibility-k: ${PORTFOLIO_CREDIBILITY_K:3.0}
    portfolio-neutral-prev-cost-claims-year-eur: ${PORTFOLIO_NEUTRAL_PREV_COST_CLAIMS_YEAR_EUR:222.2}
    portfolio-neutral-prev-n-medical-services: ${PORTFOLIO_NEUTRAL_PREV_N_MEDICAL_SERVICES:7.0}
    portfolio-neutral-prev-had-claim-or-service: ${PORTFOLIO_NEUTRAL_PREV_HAD_CLAIM_OR_SERVICE:false}
    portfolio-neutral-claim-free-previous-year: ${PORTFOLIO_NEUTRAL_CLAIM_FREE_PREVIOUS_YEAR:false}

# Actuator Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
