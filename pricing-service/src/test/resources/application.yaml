spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  task:
    scheduling:
      enabled: false
  cloud:
    discovery:
      enabled: false

app:
  services:
    product-service-url: http://localhost:8082
    user-service-url: http://localhost:8081
    application-policy-service-url: http://localhost:8084
    ai-model-service-url: http://localhost:8000
  outbox:
    publisher-enabled: false
