spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  task:
    scheduling:
      enabled: false
  cloud:
    discovery:
      enabled: false

app:
  services:
    product-service-url: http://localhost:8082
    user-service-url: http://localhost:8081
    application-policy-service-url: http://localhost:8084
    ai-model-service-url: http://localhost:8000
  outbox:
    publisher-enabled: false
  currency:
    vnd-per-eur: 25000
  rating:
    health-risk-log-alpha: 0.18
    health-factor-min: 0.85
    health-factor-max: 1.40
    portfolio-factor-min: 0.85
    portfolio-factor-max: 1.30
    portfolio-credibility-k: 3.0
    portfolio-neutral-prev-cost-claims-year-eur: 222.2
    portfolio-neutral-prev-n-medical-services: 7.0
    portfolio-neutral-prev-had-claim-or-service: false
    portfolio-neutral-claim-free-previous-year: false
