server:
  port: ${PORT:8082}

spring:
  application:
    name: product-service
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:${POSTGRES_HOST:${HOST:localhost}}}:${DB_PORT:${POSTGRES_PORT:5434}}/${DB_NAME:${POSTGRES_DB:product_db}}
    username: ${DB_USER:${POSTGRES_USER:postgres}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      database: 1
      host: ${REDIS_HOST:${HOST:localhost}}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:secret_password}
      timeout: 3000


# Actuator Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9002}
  external-url: ${MINIO_EXTERNAL_URL:http://localhost:9002}
  access-key: ${SPRING_MINIO_ACCESS_KEY:${MINIO_ROOT_USER:minioadmin}}
  secret-key: ${SPRING_MINIO_SECRET_KEY:${MINIO_ROOT_PASSWORD:minioadminpassword}}
  bucket-name: ${SPRING_MINIO_BUCKET:${MINIO_BUCKET_NAME:insurance-products}}
