openapi: 3.0.3
info:
  title: Product Service
  version: 1.0.0
  description: Insurance products, coverage plans, risk input schemas and occupation risk mappings.
paths:
  /products:
    get:
      summary: List insurance products
      parameters:
        - name: productType
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/size"
      responses:
        "200":
          description: Paged products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedProductResponse"
  /products/{productId}:
    get:
      summary: Get product by ID
      parameters:
        - $ref: "#/components/parameters/productId"
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceProductResponse"
  /products/{productId}/coverage-plans:
    get:
      summary: List coverage plans for a product
      parameters:
        - $ref: "#/components/parameters/productId"
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Coverage plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCoveragePlanResponse"
  /coverage-plans/{coveragePlanId}:
    get:
      summary: Get coverage plan by ID
      parameters:
        - $ref: "#/components/parameters/coveragePlanId"
      responses:
        "200":
          description: Coverage plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoveragePlanResponse"
  /products/{productId}/risk-input-schema:
    get:
      summary: Get active risk input schema by product
      parameters:
        - $ref: "#/components/parameters/productId"
      responses:
        "200":
          description: Risk input schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskInputSchemaResponse"
  /risk-input-schemas/by-product-type/{productType}:
    get:
      summary: Get active risk input schema by product type
      parameters:
        - name: productType
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Risk input schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskInputSchemaResponse"
  /products/{productId}/occupation-risk-mappings:
    get:
      summary: List occupation risk mappings by product
      parameters:
        - $ref: "#/components/parameters/productId"
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Occupation risk mappings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOccupationRiskMappingResponse"
  /occupation-risk-mappings:
    get:
      summary: List occupation risk mappings by product type
      parameters:
        - name: productType
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Occupation risk mappings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOccupationRiskMappingResponse"
  /internal/coverage-plans/{coveragePlanId}:
    get:
      summary: Get internal coverage plan data for pricing
      parameters:
        - $ref: "#/components/parameters/coveragePlanId"
      responses:
        "200":
          description: Internal coverage plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalCoveragePlanResponse"
  /internal/occupation-risk-mappings/resolve:
    get:
      summary: Resolve occupation code to risk level
      parameters:
        - name: productType
          in: query
          required: true
          schema:
            type: string
        - name: occupationCode
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resolved occupation risk
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveOccupationRiskResponse"
  /admin/products:
    post:
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInsuranceProductRequest"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceProductResponse"
  /admin/products/{productId}:
    put:
      summary: Update product
      parameters:
        - $ref: "#/components/parameters/productId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInsuranceProductRequest"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceProductResponse"
  /admin/products/{productId}/image:
    post:
      summary: Upload product image
      parameters:
        - $ref: "#/components/parameters/productId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Product with updated image URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceProductResponse"
  /admin/products/{productId}/status:
    patch:
      summary: Update product status
      parameters:
        - $ref: "#/components/parameters/productId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusUpdateRequest"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceProductResponse"
  /admin/products/{productId}/coverage-plans:
    post:
      summary: Create coverage plan
      parameters:
        - $ref: "#/components/parameters/productId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCoveragePlanRequest"
      responses:
        "201":
          description: Created coverage plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoveragePlanResponse"
  /admin/coverage-plans/{coveragePlanId}:
    put:
      summary: Update coverage plan
      parameters:
        - $ref: "#/components/parameters/coveragePlanId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCoveragePlanRequest"
      responses:
        "200":
          description: Updated coverage plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoveragePlanResponse"
  /admin/coverage-plans/{coveragePlanId}/status:
    patch:
      summary: Update coverage plan status
      parameters:
        - $ref: "#/components/parameters/coveragePlanId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusUpdateRequest"
      responses:
        "200":
          description: Updated coverage plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoveragePlanResponse"
  /admin/coverage-plans/{coveragePlanId}/loading-rate:
    patch:
      summary: Update coverage plan loading rate
      parameters:
        - $ref: "#/components/parameters/coveragePlanId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLoadingRateRequest"
      responses:
        "200":
          description: Updated coverage plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoveragePlanResponse"
  /admin/products/{productId}/risk-input-schemas:
    post:
      summary: Create risk input schema
      parameters:
        - $ref: "#/components/parameters/productId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRiskInputSchemaRequest"
      responses:
        "201":
          description: Created risk input schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskInputSchemaResponse"
  /admin/risk-input-schemas/{schemaId}:
    put:
      summary: Update risk input schema
      parameters:
        - name: schemaId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRiskInputSchemaRequest"
      responses:
        "200":
          description: Updated risk input schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskInputSchemaResponse"
  /admin/risk-input-schemas/{schemaId}/status:
    patch:
      summary: Update risk input schema status
      parameters:
        - name: schemaId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusUpdateRequest"
      responses:
        "200":
          description: Updated risk input schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskInputSchemaResponse"
  /admin/products/{productId}/occupation-risk-mappings:
    post:
      summary: Create occupation risk mapping
      parameters:
        - $ref: "#/components/parameters/productId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOccupationRiskMappingRequest"
      responses:
        "201":
          description: Created occupation risk mapping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OccupationRiskMappingResponse"
  /admin/occupation-risk-mappings/{mappingId}:
    put:
      summary: Update occupation risk mapping
      parameters:
        - name: mappingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOccupationRiskMappingRequest"
      responses:
        "200":
          description: Updated occupation risk mapping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OccupationRiskMappingResponse"
  /admin/occupation-risk-mappings/{mappingId}/status:
    patch:
      summary: Update occupation risk mapping status
      parameters:
        - name: mappingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusUpdateRequest"
      responses:
        "200":
          description: Updated occupation risk mapping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OccupationRiskMappingResponse"
components:
  parameters:
    page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
    size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
    productId:
      name: productId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    coveragePlanId:
      name: coveragePlanId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    InsuranceProductResponse:
      type: object
      additionalProperties: true
      properties:
        productId:
          type: string
          format: uuid
        productCode:
          type: string
        productName:
          type: string
        productType:
          type: string
        status:
          type: string
        imageUrl:
          type: string
          nullable: true
    CoveragePlanResponse:
      type: object
      additionalProperties: true
      properties:
        coveragePlanId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        planName:
          type: string
        sumInsured:
          type: number
        loadingRate:
          type: number
        reimbursementEnabled:
          type: boolean
        status:
          type: string
    InternalCoveragePlanResponse:
      allOf:
        - $ref: "#/components/schemas/CoveragePlanResponse"
    RiskInputSchemaResponse:
      type: object
      additionalProperties: true
      properties:
        schemaId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        productType:
          type: string
        schemaJson:
          type: object
          additionalProperties: true
        status:
          type: string
    OccupationRiskMappingResponse:
      type: object
      additionalProperties: true
      properties:
        mappingId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        productType:
          type: string
        occupationCode:
          type: string
        riskLevel:
          type: string
        status:
          type: string
    ResolveOccupationRiskResponse:
      type: object
      additionalProperties: true
      properties:
        productType:
          type: string
        occupationCode:
          type: string
        riskLevel:
          type: string
    PagedProductResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/InsuranceProductResponse"
        content:
          type: array
          items:
            $ref: "#/components/schemas/InsuranceProductResponse"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
    ListCoveragePlanResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CoveragePlanResponse"
        content:
          type: array
          items:
            $ref: "#/components/schemas/CoveragePlanResponse"
    ListOccupationRiskMappingResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OccupationRiskMappingResponse"
        content:
          type: array
          items:
            $ref: "#/components/schemas/OccupationRiskMappingResponse"
    CreateInsuranceProductRequest:
      type: object
      additionalProperties: true
    UpdateInsuranceProductRequest:
      type: object
      additionalProperties: true
    CreateCoveragePlanRequest:
      type: object
      additionalProperties: true
    UpdateCoveragePlanRequest:
      type: object
      additionalProperties: true
    UpdateLoadingRateRequest:
      type: object
      additionalProperties: true
      properties:
        loadingRate:
          type: number
    StatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
    CreateRiskInputSchemaRequest:
      type: object
      additionalProperties: true
    UpdateRiskInputSchemaRequest:
      type: object
      additionalProperties: true
    CreateOccupationRiskMappingRequest:
      type: object
      additionalProperties: true
    UpdateOccupationRiskMappingRequest:
      type: object
      additionalProperties: true
