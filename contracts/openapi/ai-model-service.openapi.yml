openapi: 3.0.3
info:
  title: AI Model Service
  version: 1.0.0
  description: >
    Returns Frequency-Severity predictions for Health Insurance pricing.
    Pricing Service recalculates purePremium and finalPremium.
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service status
  /health/pricing/metadata:
    get:
      summary: Get active model metadata
      responses:
        "200":
          description: Active model metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelMetadataResponse"
  /health/pricing/predict:
    post:
      summary: Predict annual claim frequency and average severity
      description: >
        The AI Model Service does not receive loadingRate and does not calculate
        finalPremium. It returns predictedAnnualFrequency, predictedAverageSeverity
        and purePremium. Pricing Service verifies purePremium and applies
        finalPremium = purePremium * (1 + loadingRate).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HealthPricingPredictionRequest"
      responses:
        "200":
          description: Frequency-Severity prediction payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthPricingPredictionResponse"
components:
  schemas:
    HealthRiskProfile:
      type: object
      required: [age, sex, bmi, children, smoker, bloodPressure, exerciseFrequency, preExistingCondition, occupationRisk]
      properties:
        age:
          type: number
          minimum: 0
          maximum: 120
        sex:
          type: string
          enum: [male, female]
        bmi:
          type: number
          minimum: 10
          maximum: 80
        children:
          type: integer
          minimum: 0
          maximum: 20
        smoker:
          type: string
          enum: [yes, no]
        bloodPressure:
          type: number
          minimum: 70
          maximum: 220
        exerciseFrequency:
          type: string
        preExistingCondition:
          type: boolean
        occupationRisk:
          type: string
          enum: [low, moderate, high]
    PortfolioPricingProfile:
      type: object
      properties:
        gender:
          type: string
          nullable: true
        typeProduct:
          type: string
          nullable: true
        typePolicy:
          type: string
          nullable: true
        reimbursement:
          type: string
          nullable: true
        exposureTime:
          type: number
          nullable: true
          minimum: 0
        seniorityInsured:
          type: number
          nullable: true
          minimum: 0
        newBusiness:
          type: string
          nullable: true
        distributionChannel:
          type: string
          nullable: true
        prevCostClaimsYear:
          type: number
          nullable: true
          minimum: 0
        prevNMedicalServices:
          type: number
          nullable: true
          minimum: 0
        prevHadClaimOrService:
          type: boolean
          nullable: true
        claimFreePreviousYear:
          type: boolean
          nullable: true
    HistoricalExperienceFeatures:
      type: object
      properties:
        pastClaimCount:
          type: integer
          nullable: true
          minimum: 0
        totalPastClaimAmount:
          type: number
          nullable: true
          minimum: 0
        claimFreeYears:
          type: integer
          nullable: true
          minimum: 0
        recencyWeightedClaimScore:
          type: number
          nullable: true
          minimum: 0
    HealthPricingPredictionRequest:
      type: object
      required: [productType, riskProfile]
      properties:
        productType:
          type: string
          enum: [HEALTH]
        riskProfile:
          $ref: "#/components/schemas/HealthRiskProfile"
        portfolioProfile:
          nullable: true
          $ref: "#/components/schemas/PortfolioPricingProfile"
        historicalExperienceFeatures:
          nullable: true
          $ref: "#/components/schemas/HistoricalExperienceFeatures"
    ExplanationPayload:
      type: object
      properties:
        topFactors:
          type: array
          items:
            type: object
        shapValues:
          type: object
          nullable: true
        method:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
    HealthPricingPredictionResponse:
      type: object
      required:
        - predictedAnnualFrequency
        - predictedAverageSeverity
        - purePremium
        - riskLevel
        - frequencyModelVersion
        - severityModelVersion
        - frequencyExplanation
        - severityExplanation
      properties:
        predictedAnnualFrequency:
          type: number
          example: 10.5
        predictedAverageSeverity:
          type: number
          example: 450000
        purePremium:
          type: number
          example: 4725000
        riskLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        frequencyModelVersion:
          type: string
          example: frequency-v4
        severityModelVersion:
          type: string
          example: severity-v1
        frequencyExplanation:
          $ref: "#/components/schemas/ExplanationPayload"
        severityExplanation:
          $ref: "#/components/schemas/ExplanationPayload"
    ModelMetadataResponse:
      type: object
      required: [serviceVersion, noFinalPremiumInModel, finalPremiumFormula]
      properties:
        serviceVersion:
          type: string
        noFinalPremiumInModel:
          type: boolean
        finalPremiumFormula:
          type: string
          example: purePremium * (1 + loadingRate)
